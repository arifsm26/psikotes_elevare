# Ganti baris asli:
# sqlalchemy.url = driver://user:pass@localhost/dbname

# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template for migration file names, e.g.
# %%(rev)s_%%(slug)s.py
file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
# as well as the filename.
# If specified, requires the 'tzdata' package
# E.g. timezone = UTC
timezone =UTC

# max length of characters to apply to the
# "slug" field
# truncate = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# version locations, relative to the script_location directory
version_locations = %(here)s/versions

# the file encoding used to write migration files
# file_encoding = utf-8

# --- INI BARIS YANG ANDA UBAH, PASTIKAN DI BAWAH [alembic] ---
# sqlalchemy.url = mysql+mysqlclient://%(DB_USER)s:%(DB_PASSWORD)s@%(DB_HOST)s/%(DB_NAME)s
# ... sisa file (logging, etc.) biarkan saja ...
# ... (bagian [alembic] dan sqlalchemy.url Anda sudah benar di atas) ...


# #################################################################
# A logger configuration section.
# #################################################################

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
